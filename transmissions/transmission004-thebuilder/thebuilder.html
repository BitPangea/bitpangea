  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #02050a;
      --gold: #d4a938;
      --cyan: #00c8d7;
      --white: #ffffff;
      --line: rgba(212, 169, 56, 0.18);
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      position: relative;
      line-height: 1.72;
      overflow-x: hidden;
      background: #000;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 18%, rgba(0, 200, 215, 0.09), transparent 28%),
        radial-gradient(circle at 50% 82%, rgba(212, 169, 56, 0.08), transparent 34%),
        linear-gradient(180deg, rgba(2,5,10,.94), rgba(2,5,10,.99));
      z-index: -2;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(90deg, transparent, rgba(212,169,56,.035), transparent),
        linear-gradient(180deg, rgba(0,0,0,.18), transparent 45%, rgba(0,0,0,.32));
      opacity: .65;
      z-index: -1;
      pointer-events: none;
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      min-height: 86px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 28px;
      padding: 18px 42px;
      background: rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(212, 169, 56, 0.14);
      z-index: 1000;
    }

.hero-image {
  display: block;
  width: 100%;
  max-width: 820px;
  height: auto;
  margin: 0 auto 40px;
  border: 1px solid rgba(212,169,56,.18);
}
    
    .brand {
      flex: 0 0 auto;
      color: var(--white);
      text-decoration: none;
      letter-spacing: 9px;
      font-size: 24px;
      font-weight: 400;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .brand span {
      display: block;
      margin-top: 4px;
      color: var(--gold);
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .nav {
      display: flex;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 18px 28px;
    }

    .nav a,

      color: rgba(212, 169, 56, 0.92);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;

    .nav a.active,
.nav a[aria-current="page"] {
 color: #ffffff;
 border-bottom: 1px solid rgba(212, 169, 56, 0.95);
 padding-bottom: 4px;
 text-shadow: 0 0 12px rgba(212, 169, 56, 0.65);
}

    }

    .container {

      border: 1px solid var(--line);
      box-shadow: 0 0 70px rgba(0, 0, 0, 0.58);
      backdrop-filter: blur(4px);
